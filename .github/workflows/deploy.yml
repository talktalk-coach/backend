name: Deploy to Amazon ECS

# 1. 언제 이 스크립트를 실행할 것인가? (main 브랜치에 코드가 push 될 때)
on:
  push:
    branches:
      - main

# 2. 사용할 환경 변수 세팅
env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: talktalk-coach
  ECS_CLUSTER: talktalk-cluster
  ECS_SERVICE: talktalk-service-v2
  TASK_FAMILY: talktalk-task
  CONTAINER_NAME: talktalk-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 레포지토리의 코드를 가져옴
      - name: Checkout 코드가져오기
        uses: actions/checkout@v3

      - name: JDK 21 설치
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Spring Boot 애플리케이션 빌드
      - name: Gradle 빌드 (테스트 제외)
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 4. AWS 권한 설정
      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Amazon ECR 로그인
      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. 도커 이미지 생성 및 ECR 푸시
      - name: 도커 이미지 빌드 및 푸시
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} # 깃허브 커밋 고유번호를 태그로 사용
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 7. 현재 실행 중인 ECS 작업 정의 다운로드
      - name: 기존 작업 정의(설계도) 다운로드
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.TASK_FAMILY }} --query taskDefinition > task-definition.json

      # 8. 다운로드한 작업 정의에 방금 만든 새 도커 이미지 주소 갈아끼우기
      - name: 작업 정의에 새 이미지 렌더링
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      # 9. 새 작업 정의로 ECS 서비스 강제 배포!
      - name: ECS 서비스 업데이트 및 배포
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true # 배포가 완전히 끝날 때까지 대기