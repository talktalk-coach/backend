spring:
  profiles:
    active: local

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  # Jackson 날짜 직렬화 설정
  jackson:
    serialization:
      write-dates-as-timestamps: false   # LocalDateTime → ISO 8601 문자열로 직렬화
    time-zone: Asia/Seoul

  # 파일 업로드 제한
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  # TODO: 카카오/구글 API 준비 완료 후 아래 oauth2 블록 주석 해제
